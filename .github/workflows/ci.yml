name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-aws:
    name: Build AWS Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build -w aws

  build-scaleway:
    name: Build Scaleway Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w scaleway
      - run: npm run build -w scaleway

  lint-src:
    name: Lint shared source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w src

  test-src:
    name: Test shared source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test -w src

  validate-aws-terraform:
    name: Validate AWS Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - run: terraform init -backend=false
        working-directory: aws
      - run: terraform validate
        working-directory: aws
      - run: terraform fmt -check -recursive
        working-directory: aws

  validate-scaleway-terraform:
    name: Validate Scaleway Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - run: terraform init -backend=false
        working-directory: scaleway
      - run: terraform validate
        working-directory: scaleway
      - run: terraform fmt -check -recursive
        working-directory: scaleway
